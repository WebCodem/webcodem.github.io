<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/resources/css/style-20.css">
    <title>Editor de HTML/JS/CSS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.63.1/mode/css/css.min.js"></script>
</head>
<body>
    <div class="editor-container">
        <textarea id="editor" name="code" rows="10" cols="50"></textarea>
        <div class="editor-buttons">
            <button id="saveButton">Guardar</button>
            <button id="loadButton">Cargar</button>
            <button id="runButton">Ejecutar</button>
        </div>
    </div>
    <iframe id="resultFrame" sandbox="allow-same-origin allow-scripts" style="display: none;"></iframe>
    <button id="backToEditorButton">Regresar al Editor</button>
    <br>
  <script src="/resources/js/script-24.js"></script>
      <style>
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  z-index: 9999;
  color: white;
  text-align: center;
  font-size: 24px;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px;
  border: 2px solid white;
}
</style>
</head>
<body>
<div id="overlay">
  <div id="message">Página en mantenimiento, por favor regresa más tarde</div>
</div>
</body>
</html>
