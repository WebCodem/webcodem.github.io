<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas</title>
</head>
<body>
    <div id="spanishText" style="display: none;">
        <h1>Generador de Contraseñas</h1>
        <p>Haz clic en el botón para generar una contraseña segura:</p>
        <div>
            <button onclick="generarContrasena()">Generar Contraseña</button>
            <p id="contrasenaGeneradaSpanish"></p>
            <a id="copiarContrasenaSpanish" onclick="copiarContrasena('contrasenaGeneradaSpanish')">Copiar</a>
            <p id="mensajeExito"></p>
        </div>
    </div>
    <div id="englishText" style="display: none;">
        <h1>Password Generator</h1>
        <p>Click the button to generate a strong password:</p>
        <div>
            <button onclick="generarContrasena()">Generate Password</button>
            <p id="contrasenaGeneradaEnglish"></p>
            <a id="copiarContrasenaEnglish" onclick="copiarContrasena('contrasenaGeneradaEnglish')">Copy</a>
            <p id="mensajeExito"></p>
        </div>
    </div>
</body>
</html>
